<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
           background-color: rgb(246, 102, 102); 
           height: 100px;
           width: 200px;
           border-radius: 20px;
           box-shadow: 2px 2px red;
           transition: 1s all;
           border: 1px black solid;
           text-align: center;
           display: flex;
           justify-content: center;
           align-items: center;
        }
        .box:hover{
            background-color: papayawhip;
            width: 100%;
            font-size: 30px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="box">
        NIHAL
    </div>
</body>
</html>
