<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Product Search</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-6xl mx-auto p-8">

        <h1 class="text-4xl font-bold text-center mb-8 text-blue-600">
            Product Search
        </h1>

        <input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)"
            class="w-full p-4 border rounded-xl shadow mb-8" />

        <div id="productContainer" class="grid md:grid-cols-3 gap-6">
        </div>

    </div>


    <script>

        const products = [
            { id: 1, name: "Laptop Pro", category: "Electronics", price: 899, inStock: true },
            { id: 2, name: "Gaming Mouse", category: "Electronics", price: 45, inStock: true },
            { id: 3, name: "Office Chair", category: "Furniture", price: 150, inStock: false },
            { id: 4, name: "Notebook", category: "Stationery", price: 6, inStock: true },
            { id: 5, name: "Smartphone", category: "Electronics", price: 699, inStock: true },
            { id: 6, name: "Coffee Table", category: "Furniture", price: 220, inStock: true },
            { id: 7, name: "Headphones", category: "Electronics", price: 120, inStock: false },
            { id: 8, name: "Backpack", category: "Accessories", price: 55, inStock: true },
            { id: 9, name: "Keyboard", category: "Electronics", price: 80, inStock: true },
            { id: 10, name: "Desk Lamp", category: "Home", price: 35, inStock: true }
        ];

        const productContainer = document.getElementById("productContainer");



        function showProducts(data) {

            // clear old cards
            productContainer.innerHTML = "";

            data.map(product => {

                productContainer.innerHTML += `
<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-3">
${product.name}
</h2>

<p class="mb-2">
Category: ${product.category}
</p>

<p class="mb-2 font-semibold text-green-600">
$${product.price}
</p>

<p class="${product.inStock ? 'text-blue-600' : 'text-red-500'}">
${product.inStock ? 'In Stock' : 'Out Of Stock'}
</p>

</div>
`;

            });

        }



        function searchProduct(text) {

            let searchText = text.toLowerCase();

            let filteredData = products.filter(item =>
                item.name.toLowerCase().includes(searchText)
            );

            showProducts(filteredData);

        }


        showProducts(products);

    </script>

</body>

</html>
