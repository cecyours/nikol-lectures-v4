<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
</head>

<style>
    .container {
        width: 500px;
        height: 700px;
        background-color: cadetblue;
        display: flex;


    }

    .box {
        width: 150px;
        height: 150px;
    }

    .box:nth-child(even) {
        background-color: peru;
    }

    .box:nth-child(odd) {
        background-color: crimson;
    }


    .box1 {
        flex-basis: 200px;
    }

    .box2 {
        flex-shrink: 5;
    }
</style>

<body>



    <div class="container">
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>

    </div>
</body>

</html>
