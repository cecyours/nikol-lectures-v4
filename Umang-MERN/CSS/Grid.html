<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
</head>

<style>
    .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 100px 100px;
        gap: 10px;
        background-color: lightgray;
    }

    .grid-item {
        background-color: lightblue;
        text-align: center;
        line-height: 100px;
        border: 2px solid red;
    }



    .header {
        grid-area: header;
    }

    .sidebar {
        grid-area: sidebar;
    }

    .container {
        display: grid;

        grid-template-areas:
            "header header"
            "sidebar content"
            "footer footer";
    }
</style>


<body>


    <div class="container">
        <div class="header">Header</div>
        <div class="sideba">Sidebar</div>
        <div class="content">Content</div>
        <footer class="footer">Footer</footer>
    </div>
